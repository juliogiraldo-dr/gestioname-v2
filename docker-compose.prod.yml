# Gestioname v2 — Producción (deploy.datarecover.cloud)
# Traefik termina TLS (Let's Encrypt) y enruta por Host/Path:
#   *.gestioname.app/api/*  → nginx (API Laravel; el subdominio identifica al tenant)
#   *.gestioname.app/*      → frontend (Next.js)
# Imágenes con código horneado (Dockerfile.prod). Requiere un .env (ver .env.production.example).
# Los volúmenes nombrados public_assets/storage_data se siembran desde la imagen en el primer
# arranque; tras cambios de assets, recrearlos (docker compose down -v public_assets || rebuild).

services:
  traefik:
    image: traefik:v3.1
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      # Wildcard *.gestioname.app requiere reto DNS-01 (configurar el proveedor DNS).
      - --certificatesresolvers.le.acme.email=${LETSENCRYPT_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks: [gestioname]

  backend:
    build: { context: ., dockerfile: docker/php/Dockerfile.prod }
    restart: unless-stopped
    env_file: .env
    volumes:
      - public_assets:/var/www/public
      - storage_data:/var/www/storage
    depends_on: [postgres, redis]
    networks: [gestioname]

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    volumes:
      - public_assets:/var/www/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on: [backend]
    labels:
      - traefik.enable=true
      - "traefik.http.routers.api.rule=HostRegexp(`^.+\\.gestioname\\.app$`) && PathPrefix(`/api`)"
      - traefik.http.routers.api.entrypoints=websecure
      - traefik.http.routers.api.tls.certresolver=le
      - traefik.http.services.api.loadbalancer.server.port=80
    networks: [gestioname]

  worker:
    build: { context: ., dockerfile: docker/php/Dockerfile.prod }
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    env_file: .env
    volumes:
      - storage_data:/var/www/storage
    depends_on: [postgres, redis]
    networks: [gestioname]

  scheduler:
    build: { context: ., dockerfile: docker/php/Dockerfile.prod }
    restart: unless-stopped
    command: sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    env_file: .env
    volumes:
      - storage_data:/var/www/storage
    depends_on: [postgres, redis]
    networks: [gestioname]

  frontend:
    build: { context: ., dockerfile: docker/node/Dockerfile.prod }
    restart: unless-stopped
    env_file: .env
    labels:
      - traefik.enable=true
      - "traefik.http.routers.app.rule=Host(`gestioname.app`) || HostRegexp(`^.+\\.gestioname\\.app$`)"
      - traefik.http.routers.app.entrypoints=websecure
      - traefik.http.routers.app.tls.certresolver=le
      - traefik.http.routers.app.priority=1
      - traefik.http.services.app.loadbalancer.server.port=3000
    depends_on: [nginx]
    networks: [gestioname]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [gestioname]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    networks: [gestioname]

networks:
  gestioname: { driver: bridge }

volumes:
  pgdata:
  redisdata:
  letsencrypt:
  public_assets:
  storage_data:
