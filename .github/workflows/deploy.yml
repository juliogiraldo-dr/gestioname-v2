name: Deploy

# Construye y publica las imágenes de producción en GHCR al hacer merge a main.
# El despliegue se realiza desde la plataforma de Datarecover usando estas imágenes.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: juliogiraldo-dr

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/php/Dockerfile.prod
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/gestioname-backend:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/gestioname-backend:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/node/Dockerfile.prod
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/gestioname-frontend:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/gestioname-frontend:${{ github.sha }}
