name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: []  # Sin dependencia — CI ya pasó para llegar a main

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/php/Dockerfile.prod
          push: true
          tags: ghcr.io/datarecover/gestioname-backend:${{ github.sha }},ghcr.io/datarecover/gestioname-backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/node/Dockerfile.prod
          push: true
          tags: ghcr.io/datarecover/gestioname-frontend:${{ github.sha }},ghcr.io/datarecover/gestioname-frontend:latest

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/gestioname
            export IMAGE_TAG=${{ github.sha }}
            docker compose pull backend frontend
            docker compose up -d --no-deps backend frontend worker
            docker compose exec -T backend php artisan migrate:tenants --force
            docker compose exec -T backend php artisan config:cache
            docker compose exec -T backend php artisan route:cache
            docker compose exec -T backend php artisan view:cache
            docker compose exec -T backend php artisan queue:restart
            docker system prune -f --filter "until=24h"

      - name: Health check
        run: |
          sleep 20
          curl --fail https://api.gestioname.app/health || exit 1

      - name: Notify on failure
        if: failure()
        run: echo "Deploy failed — revisar logs en GitHub Actions"
